kind = "web"
previewPath = "/"
title = "Kings Player"
version = "1.0.0"
id = "artifacts/kings-player"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20719

[services.development]
run = "pnpm --filter @workspace/kings-player run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kings-player", "run", "build" ]
publicDir = "public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20719"
BASE_PATH = "/"
